<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParseriasAIfaesa — Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0059bb 0%, #0070ea 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .offline-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #e8eef7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      color: #191c1d;
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p {
      color: #414754;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-button {
      display: inline-block;
      background: #0059bb;
      color: white;
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .retry-button:hover {
      background: #0047a0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Você está Offline</h1>
    <p>
      Parece que sua conexão foi perdida. 
      Verifique sua conexão com a internet e tente novamente.
    </p>
    <button class="retry-button" onclick="window.location.reload()">
      Tentar Novamente
    </button>
  </div>
</body>
</html>
